
<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajon-soiton opetus</title>
    <style>
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .kortti {
            max-width: 900px;
            margin: auto;
            background: #161616;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        h1, h2, h3 {
            color: #00ffcc;
        }
        button {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            margin: 10px auto;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: block;
        }
        .start { background: #00ffcc; color: #000; }
        .mode { background: #333; color: #fff; }
        .stop { background: #cc0000; color: #fff; }
        #viesti {
            margin: 20px auto;
            font-size: 20px;
            color: #00ffcc;
            min-height: 40px;
        }
        #meter {
            width: 100%;
            max-width: 500px;
            height: 20px;
            background: #222;
            border-radius: 10px;
            margin: 15px auto;
        }
        #level {
            height: 100%;
            width: 0%;
            background: #00ffcc;
            border-radius: 10px;
        }
        #videoContainer {
            margin-top: 30px;
            text-align: center;
        }
        #videos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .videoWrapper {
            width: 320px;
            margin: 10px;
        }
        iframe {
            width: 100%;
            height: 200px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="kortti">
        <h1>🥁 Cajon-soiton opetus</h1>

        <h2>🎧 Valitse tapa soittaa</h2>

        <button class="mode" onclick="setMode('flow')">🌊 Flow (ei stressiä)</button>
        <button class="mode" onclick="setMode('groove')">🥁 Groove (cajón)</button>
        <button class="mode" onclick="setMode('voice')">🎤 Kurkkulaulu</button>
        <button class="mode" onclick="setMode('strict')">🎯 Tarkempi opettaja</button>

        <button class="start" onclick="start()">▶️ Aloita</button>
        <button class="stop" onclick="stop()">⏹ Lopeta</button>

        <div id="meter"><div id="level"></div></div>
        <div id="viesti">valitse moodi</div>

        <div id="videoContainer">
            <h3>Helppoja cajon-rummun kappaleita aloittelijoille</h3>
            <div id="videos"></div>
        </div>
    </div>

    <script>
        let ctx, analyser, dataArray, source;
        let running = false;
        let mode = "flow";
        let lastPeak = 0;

        const ohjeet = {
            flow: ["jatka…", "hyvä…", "anna mennä…", "pysy tuossa…"],
            groove: ["pidä rytmi…", "älä kiirehdi…", "tasainen groove…", "lisää hiljaisia iskuja"],
            voice: ["rentouta kurkku…", "etsi resonanssi…", "pidä ääni tasaisena", "kokeile matalampaa"],
            strict: ["rytmi karkaa hieman", "liian epätasaista", "hyvä, jatka näin", "tarkempi kontrolli"]
        };

        function setMode(m) {
            mode = m;
            palaute("moodi: " + m);
        }

        async function start() {
            if (running) return;

            ctx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            source = ctx.createMediaStreamSource(stream);
            analyser = ctx.createAnalyser();
            analyser.fftSize = 256;

            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            running = true;
            loop();
        }

        function stop() {
            running = false;
            palaute("tauko");
        }

        function loop() {
            if (!running) return;

            analyser.getByteFrequencyData(dataArray);

            let avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

            document.getElementById("level").style.width = (avg * 2) + "%";

            let now = Date.now();

            if (avg > 50 && now - lastPeak > 300) {
                lastPeak = now;
                if (Math.random() < 0.5) annaOhje();
            }

            if (avg < 20 && Math.random() < 0.02) {
                annaOhje();
            }

            requestAnimationFrame(loop);
        }

        function annaOhje() {
            let lista = ohjeet[mode];
            let msg = lista[Math.floor(Math.random() * lista.length)];
            palaute(msg);
        }

        function palaute(t) {
            document.getElementById("viesti").innerText = t;
        }

        // Lista YouTube-videoista (ID:t), jotka opettavat helppoja cajon-kappaleita
        const cajonVideos = [
            { id: "Su2XlnSdBSM", title: "Cajonin pikakurssi – Beatkomppi (helppoja rytmejä)" },
            { id: "GHwgjxFOHGs", title: "Cajon tutorial for beginners (englanninkieliset tekstitykset)" },
            { id: "yoQOBsLhbOY", title: "Cajon-rumpu esittelyssä (peruslyönnit ja rytmit)" }
        ];

        // Funktio videon upottamiseen
        function embedVideos() {
            const container = document.getElementById("videos");
            cajonVideos.forEach(video => {
                const wrapper = document.createElement("div");
                wrapper.className = "videoWrapper";

                const iframe = document.createElement("iframe");
                iframe.src = `https://www.youtube.com/embed/${video.id}`;
                iframe.title = video.title;
                iframe.frameBorder = "0";
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowFullscreen = true;

                const title = document.createElement("p");
                title.textContent = video.title;
                title.style.color = "#eee";
                title.style.marginTop = "5px";

                wrapper.appendChild(iframe);
                wrapper.appendChild(title);
                container.appendChild(wrapper);
            });
        }

        // Kutsu funktiota sivun ladattuessa
        window.onload = embedVideos;
    </script>
</body>
</html>
