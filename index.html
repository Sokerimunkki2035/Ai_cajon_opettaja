
<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajon-soiton harjoittelu</title>
    <style>
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .kortti {
            max-width: 900px;
            margin: auto;
            background: #161616;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        h1, h2, h3 {
            color: #00ffcc;
        }
        button {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            margin: 10px auto;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: block;
        }
        .start { background: #00ffcc; color: #000; }
        .mode { background: #333; color: #fff; }
        .stop { background: #cc0000; color: #fff; }
        .videoControls {
            margin: 20px auto;
            max-width: 600px;
        }
        .videoControls button {
            width: auto;
            display: inline-block;
            margin: 5px;
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border-radius: 5px;
        }
        #viesti {
            margin: 20px auto;
            font-size: 20px;
            color: #00ffcc;
            min-height: 40px;
        }
        #meter {
            width: 100%;
            max-width: 500px;
            height: 20px;
            background: #222;
            border-radius: 10px;
            margin: 15px auto;
        }
        #level {
            height: 100%;
            width: 0%;
            background: #00ffcc;
            border-radius: 10px;
        }
        #player {
            width: 100%;
            max-width: 560px;
            height: 315px;
            margin: 20px auto;
            border-radius: 10px;
        }
        #videoContainer {
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="kortti">
        <h1>🥁 Cajon-soiton harjoittelu</h1>

        <h2>🎧 Valitse tapa soittaa</h2>

        <button class="mode" onclick="setMode('flow')">🌊 Flow (ei stressiä)</button>
        <button class="mode" onclick="setMode('groove')">🥁 Groove (cajón)</button>
        <button class="mode" onclick="setMode('voice')">🎤 Kurkkulaulu</button>
        <button class="mode" onclick="setMode('strict')">🎯 Tarkempi opettaja</button>

        <button class="start" onclick="start()">▶️ Aloita</button>
        <button class="stop" onclick="stop()">⏹ Lopeta</button>

        <div id="meter"><div id="level"></div></div>
        <div id="viesti">valitse moodi</div>

        <div id="videoContainer">
            <h3>Harjoittele videon kanssa</h3>
            <div id="player"></div>
            <div class="videoControls">
                <button onclick="slowDown()">Hidasta 0.5x</button>
                <button onclick="rewind()">Palauta 10s</button>
                <button onclick="normalSpeed()">Normaalinopeus</button>
            </div>
        </div>
    </div>

    <script>
        // Äänianalyysi (sinun eilinen koodisi)
        let ctx, analyser, dataArray, source;
        let running = false;
        let mode = "flow";
        let lastPeak = 0;

        const ohjeet = {
            flow: ["jatka…", "hyvä…", "anna mennä…", "pysy tuossa…"],
            groove: ["pidä rytmi…", "älä kiirehdi…", "tasainen groove…", "lisää hiljaisia iskuja"],
            voice: ["rentouta kurkku…", "etsi resonanssi…", "pidä ääni tasaisena", "kokeile matalampaa"],
            strict: ["rytmi karkaa hieman", "liian epätasaista", "hyvä, jatka näin", "tarkempi kontrolli"]
        };

        function setMode(m) {
            mode = m;
            palaute("moodi: " + m);
        }

        async function start() {
            if (running) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = ctx.createMediaStreamSource(stream);
            analyser = ctx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            running = true;
            loop();
        }

        function stop() {
            running = false;
            palaute("tauko");
        }

        function loop() {
            if (!running) return;
            analyser.getByteFrequencyData(dataArray);
            let avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            document.getElementById("level").style.width = (avg * 2) + "%";
            let now = Date.now();
            if (avg > 50 && now - lastPeak > 300) {
                lastPeak = now;
                if (Math.random() < 0.5) annaOhje();
            }
            if (avg < 20 && Math.random() < 0.02) annaOhje();
            requestAnimationFrame(loop);
        }

        function annaOhje() {
            let lista = ohjeet[mode];
            let msg = lista[Math.floor(Math.random() * lista.length)];
            palaute(msg);
        }

        function palaute(t) {
            document.getElementById("viesti").innerText = t;
        }

        // YouTube-videon ohjaus
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '315',
                width: '560',
                videoId: 'Su2XlnSdBSM', // Cajonin pikakurssi (voit vaihtaa)
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            console.log("Video valmis!");
        }

        function slowDown() {
            if (player) player.setPlaybackRate(0.5);
        }

        function rewind() {
            if (player) player.seekTo(player.getCurrentTime() - 10);
        }

        function normalSpeed() {
            if (player) player.setPlaybackRate(1);
        }

        // Lataa YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    </script>
</body>
</html>
