<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valitse tapa soittaa</title>

<style>
body {
    background:#0a0a0a;
    color:#eee;
    font-family:sans-serif;
    text-align:center;
    padding:20px;
}
.kortti {
    max-width:520px;
    margin:auto;
    background:#161616;
    padding:20px;
    border-radius:20px;
}
button {
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
.start { background:#00ffcc; color:#000; }
.mode { background:#333; color:#fff; }
.stop { background:#cc0000; }

#viesti {
    margin-top:20px;
    font-size:20px;
    color:#00ffcc;
    min-height:40px;
}

#meter {
    width:100%;
    height:20px;
    background:#222;
    border-radius:10px;
    margin-top:15px;
}
#level {
    height:100%;
    width:0%;
    background:#00ffcc;
}
</style>
</head>

<body>

<div class="kortti">

<h2>🎧 Valitse tapa soittaa</h2>

<button class="mode" onclick="setMode('flow')">🌊 Flow (ei stressiä)</button>
<button class="mode" onclick="setMode('groove')">🥁 Groove (cajón)</button>
<button class="mode" onclick="setMode('voice')">🎤 Kurkkulaulu</button>
<button class="mode" onclick="setMode('strict')">🎯 Tarkempi opettaja</button>

<button class="start" onclick="start()">▶️ Aloita</button>
<button class="stop" onclick="stop()">⏹ Lopeta</button>

<div id="meter"><div id="level"></div></div>
<div id="viesti">valitse moodi</div>

</div>

<script>
let ctx, analyser, dataArray, source;
let running = false;
let mode = "flow";
let lastPeak = 0;

const ohjeet = {
flow: ["jatka…","hyvä…","anna mennä…","pysy tuossa…"],
groove: ["pidä rytmi…","älä kiirehdi…","tasainen groove…","lisää hiljaisia iskuja"],
voice: ["rentouta kurkku…","etsi resonanssi…","pidä ääni tasaisena","kokeile matalampaa"],
strict: ["rytmi karkaa hieman","liian epätasaista","hyvä, jatka näin","tarkempi kontrolli"]
};

function setMode(m) {
    mode = m;
    palaute("moodi: " + m);
}

async function start() {
    if(running) return;

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });

    source = ctx.createMediaStreamSource(stream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;

    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    running = true;
    loop();
}

function stop() {
    running = false;
    palaute("tauko");
}

function loop() {
    if(!running) return;

    analyser.getByteFrequencyData(dataArray);

    let avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length;

    document.getElementById("level").style.width = (avg*2)+"%";

    let now = Date.now();

    if(avg > 50 && now - lastPeak > 300) {
        lastPeak = now;
        if(Math.random() < 0.5) annaOhje();
    }

    if(avg < 20 && Math.random() < 0.02) {
        annaOhje();
    }

    requestAnimationFrame(loop);
}

function annaOhje() {
    let lista = ohjeet[mode];
    let msg = lista[Math.floor(Math.random()*lista.length)];
    palaute(msg);
}

function palaute(t) {
    document.getElementById("viesti").innerText = t;
}
</script>

</body>
</html>
